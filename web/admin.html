<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Violation Tracker</title>
    <meta name="description" content="Admin dashboard for managing users and violations.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f1eb;
            min-height: 100vh;
            color: #1B2A4A;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #0A0980 0%, #0D1B6F 100%);
            border-right: 3px solid #FFD361;
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: fixed;
            left: 0;
            top: 0;
            min-height: 100vh;
            z-index: 50;
        }

        .sidebar-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 211, 97, 0.35);
            box-shadow: 0 0 20px rgba(255, 211, 97, 0.1);
            margin-bottom: 14px;
        }

        .sidebar-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: #FFD361;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .sidebar-sub {
            font-size: 0.68rem;
            color: rgba(176, 197, 221, 0.8);
            text-align: center;
            margin-bottom: 28px;
        }

        .sidebar-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 10px;
            color: rgba(192, 208, 232, 0.85);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            border: 1px solid transparent;
        }

        .sidebar-link:hover {
            background: rgba(255, 211, 97, 0.08);
            color: #FFD361;
            border-color: rgba(255, 211, 97, 0.12);
        }

        .sidebar-link.active {
            background: rgba(255, 211, 97, 0.15);
            color: #FFD361;
            border-color: rgba(255, 211, 97, 0.3);
        }

        .sidebar-link-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        /* ── Main Content ── */
        .main-wrapper {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
        }

        .top-header {
            background: linear-gradient(135deg, #0A0980 0%, #0D1B6F 100%);
            border-bottom: 3px solid #FFD361;
            padding: 16px 28px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .top-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD361, #FFB600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ── Tab Navigation ── */
        .admin-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 12px;
            padding: 4px;
            width: fit-content;
            border: 1px solid rgba(10, 9, 128, 0.04);
        }

        .admin-tab {
            padding: 9px 20px;
            border: none;
            border-radius: 9px;
            background: transparent;
            color: #6a7b92;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }

        .admin-tab:hover {
            color: #0A0980;
            background: rgba(255, 255, 255, 0.5);
        }

        .admin-tab.active {
            background: #fff;
            color: #0A0980;
            box-shadow: 0 2px 8px rgba(10, 9, 128, 0.06);
        }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            border-radius: 14px;
            padding: 22px;
            border: 1px solid rgba(10, 9, 128, 0.05);
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #FFD361, #FFB600);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(10, 9, 128, 0.06);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #0A0980;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.78rem;
            color: #6a7b92;
            font-weight: 600;
        }

        /* ── Panels ── */
        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* ── Cards ── */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 26px;
            border: 1px solid rgba(10, 9, 128, 0.05);
            margin-bottom: 18px;
        }

        .card h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #0A0980;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h3::before {
            content: '';
            width: 3px;
            height: 15px;
            background: linear-gradient(180deg, #FFD361, #FFB600);
            border-radius: 2px;
        }

        /* ── Form ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #3a4d6b;
        }

        .form-group input,
        .form-group select {
            padding: 10px 14px;
            border-radius: 9px;
            border: 1.5px solid rgba(10, 9, 128, 0.07);
            background: #fafafa;
            color: #1B2A4A;
            font-size: 0.86rem;
            font-family: inherit;
            transition: all 0.25s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0A0980;
            box-shadow: 0 0 0 3px rgba(10, 9, 128, 0.05);
            background: #fff;
        }

        /* ── Buttons ── */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 9px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0A0980, #1F3864);
            color: #FFD361;
            box-shadow: 0 3px 12px rgba(10, 9, 128, 0.18);
        }

        .btn-success {
            background: linear-gradient(135deg, #00cc6a, #00aa55);
            color: #fff;
        }

        .btn-danger {
            background: rgba(220, 53, 69, 0.08);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.15);
        }

        .btn-danger:hover {
            background: rgba(220, 53, 69, 0.12);
        }

        /* ── Table ── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 11px 14px;
            text-align: left;
            font-size: 0.83rem;
        }

        th {
            background: rgba(10, 9, 128, 0.025);
            font-weight: 700;
            color: #0A0980;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(10, 9, 128, 0.06);
        }

        td {
            border-bottom: 1px solid rgba(10, 9, 128, 0.04);
        }

        tr:hover td {
            background: rgba(10, 9, 128, 0.012);
        }

        .role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .role-admin {
            background: rgba(255, 68, 102, 0.1);
            color: #cc3355;
        }

        .role-teacher {
            background: rgba(0, 136, 255, 0.1);
            color: #0066cc;
        }

        .role-student {
            background: rgba(0, 180, 100, 0.1);
            color: #008855;
        }

        .violation-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.73rem;
            font-weight: 600;
        }

        .badge-hair {
            background: rgba(255, 193, 7, 0.12);
            color: #cc8800;
        }

        .badge-uniform {
            background: rgba(220, 53, 69, 0.1);
            color: #cc3344;
        }

        .badge-other {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
        }

        /* ── Messages ── */
        .msg {
            padding: 11px 16px;
            border-radius: 9px;
            font-size: 0.8rem;
            margin-bottom: 14px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        .msg.show {
            display: flex;
        }

        .msg.error {
            background: rgba(220, 53, 69, 0.07);
            border: 1px solid rgba(220, 53, 69, 0.12);
            color: #cc3344;
        }

        .msg.success {
            background: rgba(0, 180, 100, 0.07);
            border: 1px solid rgba(0, 180, 100, 0.12);
            color: #008855;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 36px 20px;
            color: #8a9bb5;
        }

        .empty-state .emoji {
            font-size: 2.2rem;
            margin-bottom: 8px;
            display: block;
        }

        .empty-state h4 {
            margin-bottom: 4px;
            color: #4a5b75;
        }

        .loading-spinner {
            text-align: center;
            padding: 36px;
            color: #6a7b92;
        }

        .lrn-field {
            display: none;
        }

        .lrn-field.show {
            display: flex;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border-radius: 9px;
            border: 1.5px solid rgba(10, 9, 128, 0.07);
            background: #fafafa;
            font-size: 0.83rem;
            font-family: inherit;
            transition: all 0.25s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #0A0980;
            background: #fff;
        }

        .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.4;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 70px;
                padding: 20px 8px;
            }

            .sidebar-title,
            .sidebar-sub {
                display: none;
            }

            .sidebar-link span:not(.sidebar-link-icon) {
                display: none;
            }

            .sidebar-link {
                justify-content: center;
                padding: 10px;
            }

            .sidebar-logo {
                width: 46px;
                height: 46px;
            }

            .main-wrapper {
                margin-left: 70px;
            }
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .container {
                padding: 14px;
            }

            .admin-tabs {
                flex-wrap: wrap;
                width: 100%;
            }
        }
    </style>
</head>

<body data-allowed-roles="admin">

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="logo.png" alt="NCLC Logo" class="sidebar-logo">
        <div class="sidebar-title">National Christian Life College, Inc.</div>
        <div class="sidebar-sub">Violation Tracking System</div>
        <nav class="sidebar-nav">
            <a class="sidebar-link active" href="admin.html">
                <span class="sidebar-link-icon">⚙️</span>
                <span>Admin Panel</span>
            </a>
            <a class="sidebar-link" href="index.html">
                <span class="sidebar-link-icon">🎥</span>
                <span>Detection</span>
            </a>
        </nav>
    </div>

    <div class="main-wrapper">
        <div class="top-header">
            <h2>⚙️ Admin Dashboard</h2>
        </div>

        <div class="container">
            <!-- Admin Tab Navigation -->
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="overview" id="overviewTab">📊 Overview</button>
                <button class="admin-tab" data-tab="users" id="usersTab">👥 User Management</button>
                <button class="admin-tab" data-tab="violations" id="violationsTab">📋 All Violations</button>
            </div>

            <!-- ══════════ OVERVIEW TAB ══════════ -->
            <div class="tab-panel active" id="panelOverview">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="statTotalUsers">-</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statStudents">-</div>
                        <div class="stat-label">Students</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statTeachers">-</div>
                        <div class="stat-label">Teachers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statViolations">-</div>
                        <div class="stat-label">Total Violations</div>
                    </div>
                </div>
            </div>

            <!-- ══════════ USERS TAB ══════════ -->
            <div class="tab-panel" id="panelUsers">
                <!-- Create Account Form -->
                <div class="card">
                    <h3>Create New Account</h3>
                    <div class="msg error" id="createError"><span>⚠️</span> <span id="createErrorText"></span></div>
                    <div class="msg success" id="createSuccess"><span>✅</span> <span id="createSuccessText"></span>
                    </div>

                    <form id="createUserForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="newFullName">Full Name</label>
                                <input type="text" id="newFullName" placeholder="Juan Dela Cruz" required />
                            </div>
                            <div class="form-group">
                                <label for="newEmail">Email Address</label>
                                <input type="email" id="newEmail" placeholder="user@email.com" required />
                            </div>
                            <div class="form-group">
                                <label for="newPassword">Password (min 6 chars)</label>
                                <input type="password" id="newPassword" placeholder="••••••••" required minlength="6" />
                            </div>
                            <div class="form-group">
                                <label for="newRole">Role</label>
                                <select id="newRole" required>
                                    <option value="student">Student</option>
                                    <option value="teacher">Teacher</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="form-group lrn-field" id="lrnField">
                                <label for="newLrn">LRN (Learner Reference Number)</label>
                                <input type="text" id="newLrn" placeholder="e.g. 425626150018" pattern="[0-9]{12}"
                                    maxlength="12" title="LRN must be exactly 12 digits" />
                            </div>
                            <div class="form-group full-width" style="flex-direction:row;align-items:flex-end;">
                                <button type="submit" class="btn btn-primary" id="createBtn">Create Account</button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Users List -->
                <div class="card">
                    <h3>All Users</h3>
                    <div class="toolbar">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="userSearchInput" placeholder="Search users..." />
                        </div>
                    </div>
                    <div id="usersContent">
                        <div class="loading-spinner">⏳ Loading users...</div>
                    </div>
                </div>
            </div>

            <!-- ══════════ VIOLATIONS TAB ══════════ -->
            <div class="tab-panel" id="panelViolations">
                <div class="card">
                    <h3>All Violations</h3>
                    <div class="toolbar">
                        <div class="search-box">
                            <span class="search-icon">🔍</span>
                            <input type="text" id="violationSearchInput" placeholder="Search by student name..." />
                        </div>
                    </div>
                    <div id="violationsContent">
                        <div class="loading-spinner">⏳ Loading violations...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="auth.js"></script>
    <script>
        let allUsers = [];
        let allViolations = [];

        // ── Tab Switching ──
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                const panelId = 'panel' + tab.getAttribute('data-tab').charAt(0).toUpperCase() + tab.getAttribute('data-tab').slice(1);
                document.getElementById(panelId).classList.add('active');
            });
        });

        // ── Show/hide LRN field based on role ──
        document.getElementById('newRole').addEventListener('change', (e) => {
            const lrnField = document.getElementById('lrnField');
            if (e.target.value === 'student') {
                lrnField.classList.add('show');
            } else {
                lrnField.classList.remove('show');
            }
        });
        // Show LRN by default since student is default
        document.getElementById('lrnField').classList.add('show');

        // ── Auth Ready ──
        window.addEventListener('auth-ready', async () => {
            await Promise.all([loadUsers(), loadViolations()]);
            updateOverviewStats();

            document.getElementById('userSearchInput').addEventListener('input', filterUsers);
            document.getElementById('violationSearchInput').addEventListener('input', filterViolations);
        });

        // ══════════ USER MANAGEMENT ══════════

        async function loadUsers() {
            const sb = getSupabaseClient();
            const { data, error } = await sb
                .from('profiles')
                .select('*, students:student_id(name, lrn, grade, section)')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('usersContent').innerHTML = `
                    <div class="empty-state"><span class="emoji">⚠️</span><h4>Error: ${error.message}</h4></div>`;
                return;
            }

            allUsers = data || [];
            renderUsers(allUsers);
        }

        function filterUsers() {
            const search = document.getElementById('userSearchInput').value.toLowerCase().trim();
            const filtered = search
                ? allUsers.filter(u =>
                    (u.full_name || '').toLowerCase().includes(search) ||
                    (u.lrn || '').includes(search) ||
                    (u.role || '').includes(search)
                )
                : allUsers;
            renderUsers(filtered);
        }

        function renderUsers(users) {
            const content = document.getElementById('usersContent');

            if (users.length === 0) {
                content.innerHTML = `
                    <div class="empty-state"><span class="emoji">👥</span><h4>No users found</h4></div>`;
                return;
            }

            content.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>LRN</th>
                            <th>Role</th>
                            <th>Grade / Section</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(u => {
                const roleClass = 'role-' + u.role;
                const date = new Date(u.created_at).toLocaleDateString('en-PH', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });
                const studentInfo = u.students;
                const name = studentInfo ? studentInfo.name : (u.full_name || '-');
                const lrn = studentInfo ? studentInfo.lrn : '-';
                const gradeSection = studentInfo ? `${studentInfo.grade} — ${studentInfo.section}` : '-';
                return `
                                <tr>
                                    <td><strong>${name}</strong></td>
                                    <td style="font-family:monospace;font-size:0.82rem;">${lrn}</td>
                                    <td><span class="role-badge ${roleClass}">${u.role}</span></td>
                                    <td>${gradeSection}</td>
                                    <td>${date}</td>
                                </tr>
                            `;
            }).join('')}
                    </tbody>
                </table>
            `;
        }

        // ── Create User ──
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideCreateMessages();

            const fullName = document.getElementById('newFullName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;
            const lrn = document.getElementById('newLrn').value.trim();
            const btn = document.getElementById('createBtn');

            // Validate
            if (!fullName || !email || !password) {
                showCreateError('Please fill in all required fields.');
                return;
            }

            if (password.length < 6) {
                showCreateError('Password must be at least 6 characters.');
                return;
            }

            if (role === 'student' && lrn && !/^\d{12}$/.test(lrn)) {
                showCreateError('LRN must be exactly 12 digits.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const sb = getSupabaseClient();

                // Save admin session before signUp (signUp can switch active session)
                const { data: { session: adminSession } } = await sb.auth.getSession();

                // Use Supabase signUp with metadata
                // The trigger will auto-create the profile
                const { data, error } = await sb.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            role: role,
                            lrn: role === 'student' ? lrn : null
                        }
                    }
                });

                // Restore admin session
                if (adminSession) {
                    await sb.auth.setSession({
                        access_token: adminSession.access_token,
                        refresh_token: adminSession.refresh_token
                    });
                }

                if (error) {
                    showCreateError(error.message);
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    return;
                }

                showCreateSuccess(`Account created for ${fullName} (${role})!`);

                // Reset form
                document.getElementById('createUserForm').reset();
                document.getElementById('lrnField').classList.add('show');

                // Reload users after a short delay (profile created by trigger)
                setTimeout(async () => {
                    await loadUsers();
                    updateOverviewStats();
                }, 1500);

            } catch (err) {
                showCreateError('Error creating account. Please try again.');
            }

            btn.disabled = false;
            btn.textContent = 'Create Account';
        });

        function hideCreateMessages() {
            document.getElementById('createError').classList.remove('show');
            document.getElementById('createSuccess').classList.remove('show');
        }

        function showCreateError(msg) {
            hideCreateMessages();
            document.getElementById('createErrorText').textContent = msg;
            document.getElementById('createError').classList.add('show');
        }

        function showCreateSuccess(msg) {
            hideCreateMessages();
            document.getElementById('createSuccessText').textContent = msg;
            document.getElementById('createSuccess').classList.add('show');
        }

        // ══════════ VIOLATIONS ══════════

        async function loadViolations() {
            const sb = getSupabaseClient();
            const { data, error } = await sb
                .from('violations')
                .select('*, students:student_id(name, lrn, sex)')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('violationsContent').innerHTML = `
                    <div class="empty-state"><span class="emoji">⚠️</span><h4>Error: ${error.message}</h4></div>`;
                return;
            }

            allViolations = data || [];
            renderViolations(allViolations);
        }

        function filterViolations() {
            const search = document.getElementById('violationSearchInput').value.toLowerCase().trim();
            const filtered = search
                ? allViolations.filter(v =>
                    (v.students?.name || '').toLowerCase().includes(search)
                )
                : allViolations;
            renderViolations(filtered);
        }

        function renderViolations(violations) {
            const content = document.getElementById('violationsContent');

            if (violations.length === 0) {
                content.innerHTML = `
                    <div class="empty-state"><span class="emoji">📭</span><h4>No violations found</h4></div>`;
                return;
            }

            content.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Gender</th>
                            <th>Reported By</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${violations.map((v, i) => {
                const type = v.violation_type.toLowerCase();
                const badgeClass = type.includes('hair') ? 'badge-hair' :
                    type.includes('uniform') ? 'badge-uniform' : 'badge-other';
                const date = new Date(v.created_at).toLocaleDateString('en-PH', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                const name = v.students?.name || 'Unknown';
                const sex = v.students?.sex || '-';
                return `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><strong>${name}</strong></td>
                                    <td><span class="violation-badge ${badgeClass}">${v.violation_type}</span></td>
                                    <td>${v.description || '-'}</td>
                                    <td>${sex}</td>
                                    <td>${v.reported_by || 'System'}</td>
                                    <td>${date}</td>
                                </tr>
                            `;
            }).join('')}
                    </tbody>
                </table>
            `;
        }

        // ══════════ OVERVIEW ══════════

        function updateOverviewStats() {
            const students = allUsers.filter(u => u.role === 'student').length;
            const teachers = allUsers.filter(u => u.role === 'teacher').length;

            document.getElementById('statTotalUsers').textContent = allUsers.length;
            document.getElementById('statStudents').textContent = students;
            document.getElementById('statTeachers').textContent = teachers;
            document.getElementById('statViolations').textContent = allViolations.length;
        }
    </script>
</body>

</html>
