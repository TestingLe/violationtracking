<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard — Violation Tracker</title>
    <meta name="description" content="View your violation records and status.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FEFCF5 0%, #FFF9EE 40%, #F5F0E8 70%, #EDE8E0 100%);
            min-height: 100vh;
            color: #1B2A4A;
        }

        .top-header {
            background: linear-gradient(135deg, #0A0980 0%, #0D1B6F 100%);
            border-bottom: 3px solid #FFD361;
            padding: 18px 28px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-header h2 {
            font-size: 1.15rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD361, #FFB600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ── Profile Card ── */
        .profile-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 28px 32px;
            border: 1px solid rgba(10, 9, 128, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: linear-gradient(135deg, #0A0980, #1F3864);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0A0980;
            margin-bottom: 4px;
        }

        .profile-info .lrn {
            font-size: 0.82rem;
            color: #6a7b92;
            font-weight: 500;
        }

        .profile-badge {
            margin-left: auto;
            background: rgba(0, 255, 136, 0.12);
            border: 1px solid rgba(0, 255, 136, 0.25);
            color: #008855;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 22px;
            border: 1px solid rgba(10, 9, 128, 0.06);
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0A0980;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.82rem;
            color: #6a7b92;
            font-weight: 600;
        }

        .stat-card.hair .stat-number {
            color: #cc8800;
        }

        .stat-card.uniform .stat-number {
            color: #cc3344;
        }

        .stat-card.other .stat-number {
            color: #6c757d;
        }

        /* ── Violations Table ── */
        .violations-section {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 28px;
            border: 1px solid rgba(10, 9, 128, 0.06);
        }

        .violations-section h3 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #0A0980;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .violations-section h3::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(180deg, #FFD361, #FFB600);
            border-radius: 2px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(10, 9, 128, 0.05);
            font-size: 0.85rem;
        }

        th {
            background: rgba(10, 9, 128, 0.03);
            font-weight: 700;
            color: #0A0980;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover td {
            background: rgba(10, 9, 128, 0.015);
        }

        .violation-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.76rem;
            font-weight: 600;
        }

        .badge-hair {
            background: rgba(255, 193, 7, 0.15);
            color: #cc8800;
        }

        .badge-uniform {
            background: rgba(220, 53, 69, 0.12);
            color: #cc3344;
        }

        .badge-other {
            background: rgba(108, 117, 125, 0.12);
            color: #6c757d;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #8a9bb5;
        }

        .empty-state .emoji {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
        }

        .empty-state h4 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: #4a5b75;
        }

        .empty-state p {
            font-size: 0.85rem;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #6a7b92;
            font-size: 0.88rem;
        }

        @media (max-width: 600px) {
            .profile-card {
                flex-direction: column;
                text-align: center;
            }

            .profile-badge {
                margin-left: 0;
            }

            .container {
                padding: 14px;
            }

            th,
            td {
                padding: 8px 10px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>

<body data-allowed-roles="student">
    <div class="top-header">
        <h2>🎓 My Violation Records</h2>
    </div>

    <div class="container">
        <!-- Profile Card -->
        <div class="profile-card">
            <div class="profile-avatar">🎒</div>
            <div class="profile-info">
                <h2 id="profileName">Loading...</h2>
                <div class="lrn" id="profileLrn"></div>
                <div class="lrn" id="profileGrade" style="margin-top:2px;"></div>
            </div>
            <div class="profile-badge">Student</div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalViolations">-</div>
                <div class="stat-label">Total Violations</div>
            </div>
            <div class="stat-card hair">
                <div class="stat-number" id="hairViolations">-</div>
                <div class="stat-label">Hair Violations</div>
            </div>
            <div class="stat-card uniform">
                <div class="stat-number" id="uniformViolations">-</div>
                <div class="stat-label">Uniform Violations</div>
            </div>
            <div class="stat-card other">
                <div class="stat-number" id="otherViolations">-</div>
                <div class="stat-label">Other</div>
            </div>
        </div>

        <!-- Violations Table -->
        <div class="violations-section">
            <h3>Violation History</h3>
            <div id="violationsContent">
                <div class="loading-spinner">⏳ Loading your records...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="auth.js"></script>
    <script>
        window.addEventListener('auth-ready', async (e) => {
            const profile = e.detail;
            const student = profile.student; // From students table join

            // Update profile card with student info
            document.getElementById('profileName').textContent =
                (student ? student.name : profile.full_name) || 'Student';
            document.getElementById('profileLrn').textContent =
                student ? `LRN: ${student.lrn}` : profile.email;
            document.getElementById('profileGrade').textContent =
                student ? `Grade ${student.grade} — ${student.section} | ${student.sex}` : '';

            // Fetch violations (RLS enforced — only own records returned)
            await loadViolations();
        });

        async function loadViolations() {
            const sb = getSupabaseClient();
            const { data, error } = await sb
                .from('violations')
                .select('*, students:student_id(name, lrn)')
                .order('created_at', { ascending: false });

            const content = document.getElementById('violationsContent');

            if (error) {
                content.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">⚠️</span>
                        <h4>Error loading records</h4>
                        <p>${error.message}</p>
                    </div>
                `;
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('totalViolations').textContent = '0';
                document.getElementById('hairViolations').textContent = '0';
                document.getElementById('uniformViolations').textContent = '0';
                document.getElementById('otherViolations').textContent = '0';

                content.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">🎉</span>
                        <h4>No Violations Found</h4>
                        <p>Great job! You have a clean record.</p>
                    </div>
                `;
                return;
            }

            // Stats
            const total = data.length;
            const hair = data.filter(v => v.violation_type.toLowerCase().includes('hair')).length;
            const uniform = data.filter(v => v.violation_type.toLowerCase().includes('uniform')).length;
            const other = total - hair - uniform;

            document.getElementById('totalViolations').textContent = total;
            document.getElementById('hairViolations').textContent = hair;
            document.getElementById('uniformViolations').textContent = uniform;
            document.getElementById('otherViolations').textContent = other;

            // Table
            content.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Reported By</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map((v, i) => {
                const type = v.violation_type.toLowerCase();
                const badgeClass = type.includes('hair') ? 'badge-hair' :
                    type.includes('uniform') ? 'badge-uniform' : 'badge-other';
                const date = new Date(v.created_at).toLocaleDateString('en-PH', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                return `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><span class="violation-badge ${badgeClass}">${v.violation_type}</span></td>
                                    <td>${v.description || '-'}</td>
                                    <td>${v.reported_by || 'System'}</td>
                                    <td>${date}</td>
                                </tr>
                            `;
            }).join('')}
                    </tbody>
                </table>
            `;
        }
    </script>
</body>

</html>
