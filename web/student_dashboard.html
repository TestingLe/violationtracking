<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard — Violation Tracker</title>
    <meta name="description" content="View your violation records and status.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f1eb;
            min-height: 100vh;
            color: #1B2A4A;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #0A0980 0%, #0D1B6F 100%);
            border-right: 3px solid #FFD361;
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: fixed;
            left: 0;
            top: 0;
            min-height: 100vh;
            z-index: 50;
        }

        .sidebar-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 211, 97, 0.35);
            box-shadow: 0 0 20px rgba(255, 211, 97, 0.1);
            margin-bottom: 14px;
        }

        .sidebar-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: #FFD361;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .sidebar-sub {
            font-size: 0.68rem;
            color: rgba(176, 197, 221, 0.8);
            text-align: center;
            margin-bottom: 28px;
        }

        .sidebar-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 10px;
            color: rgba(192, 208, 232, 0.85);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            border: 1px solid transparent;
        }

        .sidebar-link:hover {
            background: rgba(255, 211, 97, 0.08);
            color: #FFD361;
            border-color: rgba(255, 211, 97, 0.12);
        }

        .sidebar-link.active {
            background: rgba(255, 211, 97, 0.15);
            color: #FFD361;
            border-color: rgba(255, 211, 97, 0.3);
        }

        .sidebar-link-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        /* ── Main Content ── */
        .main-wrapper {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
        }

        .top-header {
            background: linear-gradient(135deg, #0A0980 0%, #0D1B6F 100%);
            border-bottom: 3px solid #FFD361;
            padding: 16px 28px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .top-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD361, #FFB600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ── Profile Card ── */
        .profile-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px 28px;
            border: 1px solid rgba(10, 9, 128, 0.05);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            background: linear-gradient(135deg, #0A0980, #1F3864);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0A0980;
            margin-bottom: 3px;
        }

        .profile-info .lrn {
            font-size: 0.8rem;
            color: #6a7b92;
            font-weight: 500;
        }

        .profile-badge {
            margin-left: auto;
            background: rgba(0, 180, 100, 0.1);
            border: 1px solid rgba(0, 180, 100, 0.2);
            color: #008855;
            padding: 5px 14px;
            border-radius: 7px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid rgba(10, 9, 128, 0.05);
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #0A0980, #1F3864);
        }

        .stat-card.hair::before {
            background: linear-gradient(90deg, #FFD361, #cc8800);
        }

        .stat-card.uniform::before {
            background: linear-gradient(90deg, #ff4466, #cc3344);
        }

        .stat-card.other::before {
            background: linear-gradient(90deg, #8a9bb5, #6c757d);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(10, 9, 128, 0.06);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #0A0980;
            margin-bottom: 3px;
        }

        .stat-label {
            font-size: 0.78rem;
            color: #6a7b92;
            font-weight: 600;
        }

        .stat-card.hair .stat-number {
            color: #cc8800;
        }

        .stat-card.uniform .stat-number {
            color: #cc3344;
        }

        .stat-card.other .stat-number {
            color: #6c757d;
        }

        /* ── Violations Table ── */
        .violations-section {
            background: #fff;
            border-radius: 16px;
            padding: 26px;
            border: 1px solid rgba(10, 9, 128, 0.05);
        }

        .violations-section h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #0A0980;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .violations-section h3::before {
            content: '';
            width: 3px;
            height: 15px;
            background: linear-gradient(180deg, #FFD361, #FFB600);
            border-radius: 2px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 11px 14px;
            text-align: left;
            font-size: 0.83rem;
        }

        th {
            background: rgba(10, 9, 128, 0.025);
            font-weight: 700;
            color: #0A0980;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(10, 9, 128, 0.06);
        }

        td {
            border-bottom: 1px solid rgba(10, 9, 128, 0.04);
        }

        tr:hover td {
            background: rgba(10, 9, 128, 0.012);
        }

        .violation-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.73rem;
            font-weight: 600;
        }

        .badge-hair {
            background: rgba(255, 193, 7, 0.12);
            color: #cc8800;
        }

        .badge-uniform {
            background: rgba(220, 53, 69, 0.1);
            color: #cc3344;
        }

        .badge-other {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8a9bb5;
        }

        .empty-state .emoji {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .empty-state h4 {
            font-size: 1rem;
            margin-bottom: 5px;
            color: #4a5b75;
        }

        .empty-state p {
            font-size: 0.82rem;
        }

        .loading-spinner {
            text-align: center;
            padding: 36px;
            color: #6a7b92;
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 70px;
                padding: 20px 8px;
            }

            .sidebar-title,
            .sidebar-sub {
                display: none;
            }

            .sidebar-link span:not(.sidebar-link-icon) {
                display: none;
            }

            .sidebar-link {
                justify-content: center;
                padding: 10px;
            }

            .sidebar-logo {
                width: 46px;
                height: 46px;
            }

            .main-wrapper {
                margin-left: 70px;
            }
        }

        @media (max-width: 600px) {
            .profile-card {
                flex-direction: column;
                text-align: center;
            }

            .profile-badge {
                margin-left: 0;
            }

            .container {
                padding: 14px;
            }

            th,
            td {
                padding: 8px 10px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>

<body data-allowed-roles="student">

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="logo.png" alt="NCLC Logo" class="sidebar-logo">
        <div class="sidebar-title">National Christian Life College, Inc.</div>
        <div class="sidebar-sub">Violation Tracking System</div>
        <nav class="sidebar-nav">
            <a class="sidebar-link active" href="student_dashboard.html">
                <span class="sidebar-link-icon">📊</span>
                <span>My Records</span>
            </a>
        </nav>
    </div>

    <div class="main-wrapper">
        <div class="top-header">
            <h2>🎓 My Violation Records</h2>
        </div>

        <div class="container">
            <!-- Profile Card -->
            <div class="profile-card">
                <div class="profile-avatar">🎒</div>
                <div class="profile-info">
                    <h2 id="profileName">Loading...</h2>
                    <div class="lrn" id="profileLrn"></div>
                    <div class="lrn" id="profileGrade" style="margin-top:2px;"></div>
                </div>
                <div class="profile-badge">Student</div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalViolations">-</div>
                    <div class="stat-label">Total Violations</div>
                </div>
                <div class="stat-card hair">
                    <div class="stat-number" id="hairViolations">-</div>
                    <div class="stat-label">Hair Violations</div>
                </div>
                <div class="stat-card uniform">
                    <div class="stat-number" id="uniformViolations">-</div>
                    <div class="stat-label">Uniform Violations</div>
                </div>
                <div class="stat-card other">
                    <div class="stat-number" id="otherViolations">-</div>
                    <div class="stat-label">Other</div>
                </div>
            </div>

            <!-- Violations Table -->
            <div class="violations-section">
                <h3>Violation History</h3>
                <div id="violationsContent">
                    <div class="loading-spinner">⏳ Loading your records...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="auth.js"></script>
    <script>
        window.addEventListener('auth-ready', async (e) => {
            const profile = e.detail;
            const student = profile.student; // From students table join

            // Update profile card with student info
            document.getElementById('profileName').textContent =
                (student ? student.name : profile.full_name) || 'Student';
            document.getElementById('profileLrn').textContent =
                student ? `LRN: ${student.lrn}` : profile.email;
            document.getElementById('profileGrade').textContent =
                student ? `Grade ${student.grade} — ${student.section} | ${student.sex}` : '';

            // Fetch violations (RLS enforced — only own records returned)
            await loadViolations();
        });

        async function loadViolations() {
            const sb = getSupabaseClient();
            const { data, error } = await sb
                .from('violations')
                .select('*, students:student_id(name, lrn)')
                .order('created_at', { ascending: false });

            const content = document.getElementById('violationsContent');

            if (error) {
                content.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">⚠️</span>
                        <h4>Error loading records</h4>
                        <p>${error.message}</p>
                    </div>
                `;
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('totalViolations').textContent = '0';
                document.getElementById('hairViolations').textContent = '0';
                document.getElementById('uniformViolations').textContent = '0';
                document.getElementById('otherViolations').textContent = '0';

                content.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">🎉</span>
                        <h4>No Violations Found</h4>
                        <p>Great job! You have a clean record.</p>
                    </div>
                `;
                return;
            }

            // Stats
            const total = data.length;
            const hair = data.filter(v => v.violation_type.toLowerCase().includes('hair')).length;
            const uniform = data.filter(v => v.violation_type.toLowerCase().includes('uniform')).length;
            const other = total - hair - uniform;

            document.getElementById('totalViolations').textContent = total;
            document.getElementById('hairViolations').textContent = hair;
            document.getElementById('uniformViolations').textContent = uniform;
            document.getElementById('otherViolations').textContent = other;

            // Table
            content.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Reported By</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map((v, i) => {
                const type = v.violation_type.toLowerCase();
                const badgeClass = type.includes('hair') ? 'badge-hair' :
                    type.includes('uniform') ? 'badge-uniform' : 'badge-other';
                const date = new Date(v.created_at).toLocaleDateString('en-PH', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                return `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><span class="violation-badge ${badgeClass}">${v.violation_type}</span></td>
                                    <td>${v.description || '-'}</td>
                                    <td>${v.reported_by || 'System'}</td>
                                    <td>${date}</td>
                                </tr>
                            `;
            }).join('')}
                    </tbody>
                </table>
            `;
        }
    </script>
</body>

</html>
