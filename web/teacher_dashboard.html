<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard — Violation Tracker</title>
    <meta name="description" content="View and manage all student violation records.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f1eb;
            min-height: 100vh;
            color: #1B2A4A;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #0A0980 0%, #0D1B6F 100%);
            border-right: 3px solid #FFD361;
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: fixed;
            left: 0;
            top: 0;
            min-height: 100vh;
            z-index: 50;
        }

        .sidebar-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 211, 97, 0.35);
            box-shadow: 0 0 20px rgba(255, 211, 97, 0.1);
            margin-bottom: 14px;
        }

        .sidebar-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: #FFD361;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .sidebar-sub {
            font-size: 0.68rem;
            color: rgba(176, 197, 221, 0.8);
            text-align: center;
            margin-bottom: 28px;
        }

        .sidebar-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 10px;
            color: rgba(192, 208, 232, 0.85);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            border: 1px solid transparent;
        }

        .sidebar-link:hover {
            background: rgba(255, 211, 97, 0.08);
            color: #FFD361;
            border-color: rgba(255, 211, 97, 0.12);
        }

        .sidebar-link.active {
            background: rgba(255, 211, 97, 0.15);
            color: #FFD361;
            border-color: rgba(255, 211, 97, 0.3);
        }

        .sidebar-link-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        /* ── Main Content ── */
        .main-wrapper {
            margin-left: 240px;
            flex: 1;
            min-height: 100vh;
        }

        .top-header {
            background: linear-gradient(135deg, #0A0980 0%, #0D1B6F 100%);
            border-bottom: 3px solid #FFD361;
            padding: 16px 28px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .top-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD361, #FFB600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid rgba(10, 9, 128, 0.05);
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #0A0980, #1F3864);
        }

        .stat-card.hair::before {
            background: linear-gradient(90deg, #FFD361, #cc8800);
        }

        .stat-card.uniform::before {
            background: linear-gradient(90deg, #ff4466, #cc3344);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(10, 9, 128, 0.06);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #0A0980;
            margin-bottom: 3px;
        }

        .stat-label {
            font-size: 0.78rem;
            color: #6a7b92;
            font-weight: 600;
        }

        .stat-card.hair .stat-number {
            color: #cc8800;
        }

        .stat-card.uniform .stat-number {
            color: #cc3344;
        }

        /* ── Search / Filter Bar ── */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 240px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 11px 16px 11px 42px;
            border-radius: 10px;
            border: 1.5px solid rgba(10, 9, 128, 0.07);
            background: #fafafa;
            color: #1B2A4A;
            font-size: 0.86rem;
            font-family: inherit;
            transition: all 0.25s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #0A0980;
            box-shadow: 0 0 0 3px rgba(10, 9, 128, 0.05);
            background: #fff;
        }

        .search-box .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.95rem;
            opacity: 0.4;
        }

        .filter-select {
            padding: 11px 16px;
            border-radius: 10px;
            border: 1.5px solid rgba(10, 9, 128, 0.07);
            background: #fafafa;
            color: #1B2A4A;
            font-size: 0.84rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s;
        }

        .filter-select:focus {
            outline: none;
            border-color: #0A0980;
            background: #fff;
        }

        /* ── Violations Table ── */
        .violations-section {
            background: #fff;
            border-radius: 16px;
            padding: 26px;
            border: 1px solid rgba(10, 9, 128, 0.05);
        }

        .violations-section h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #0A0980;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .violations-section h3::before {
            content: '';
            width: 3px;
            height: 15px;
            background: linear-gradient(180deg, #FFD361, #FFB600);
            border-radius: 2px;
        }

        .result-count {
            margin-left: auto;
            font-size: 0.75rem;
            font-weight: 500;
            color: #6a7b92;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 11px 14px;
            text-align: left;
            font-size: 0.83rem;
        }

        th {
            background: rgba(10, 9, 128, 0.025);
            font-weight: 700;
            color: #0A0980;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(10, 9, 128, 0.06);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        th:hover {
            background: rgba(10, 9, 128, 0.05);
        }

        td {
            border-bottom: 1px solid rgba(10, 9, 128, 0.04);
        }

        tr:hover td {
            background: rgba(10, 9, 128, 0.012);
        }

        .violation-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.73rem;
            font-weight: 600;
        }

        .badge-hair {
            background: rgba(255, 193, 7, 0.12);
            color: #cc8800;
        }

        .badge-uniform {
            background: rgba(220, 53, 69, 0.1);
            color: #cc3344;
        }

        .badge-other {
            background: rgba(108, 117, 125, 0.1);
            color: #6c757d;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8a9bb5;
        }

        .empty-state .emoji {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .empty-state h4 {
            font-size: 1rem;
            margin-bottom: 5px;
            color: #4a5b75;
        }

        .empty-state p {
            font-size: 0.82rem;
        }

        .loading-spinner {
            text-align: center;
            padding: 36px;
            color: #6a7b92;
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 70px;
                padding: 20px 8px;
            }

            .sidebar-title,
            .sidebar-sub {
                display: none;
            }

            .sidebar-link span:not(.sidebar-link-icon) {
                display: none;
            }

            .sidebar-link {
                justify-content: center;
                padding: 10px;
            }

            .sidebar-logo {
                width: 46px;
                height: 46px;
            }

            .main-wrapper {
                margin-left: 70px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 14px;
            }

            th,
            td {
                padding: 8px 10px;
                font-size: 0.78rem;
            }

            .toolbar {
                flex-direction: column;
            }
        }
    </style>
</head>

<body data-allowed-roles="teacher">

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="logo.png" alt="NCLC Logo" class="sidebar-logo">
        <div class="sidebar-title">National Christian Life College, Inc.</div>
        <div class="sidebar-sub">Violation Tracking System</div>
        <nav class="sidebar-nav">
            <a class="sidebar-link active" href="teacher_dashboard.html">
                <span class="sidebar-link-icon">📊</span>
                <span>All Violations</span>
            </a>
            <a class="sidebar-link" href="index.html">
                <span class="sidebar-link-icon">🎥</span>
                <span>Detection</span>
            </a>
        </nav>
    </div>

    <div class="main-wrapper">
        <div class="top-header">
            <h2>📚 Teacher Dashboard — All Student Violations</h2>
        </div>

        <div class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalViolations">-</div>
                    <div class="stat-label">Total Violations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalStudents">-</div>
                    <div class="stat-label">Students with Violations</div>
                </div>
                <div class="stat-card hair">
                    <div class="stat-number" id="hairViolations">-</div>
                    <div class="stat-label">Hair Violations</div>
                </div>
                <div class="stat-card uniform">
                    <div class="stat-number" id="uniformViolations">-</div>
                    <div class="stat-label">Uniform Violations</div>
                </div>
            </div>

            <!-- Search / Filter Bar -->
            <div class="toolbar">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search by student name or LRN..."
                        autocomplete="off" />
                </div>
                <select class="filter-select" id="typeFilter">
                    <option value="">All Types</option>
                    <option value="hair">Hair Violations</option>
                    <option value="uniform">Uniform Violations</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- Violations Table -->
            <div class="violations-section">
                <h3>
                    All Student Violations
                    <span class="result-count" id="resultCount"></span>
                </h3>
                <div id="violationsContent">
                    <div class="loading-spinner">⏳ Loading violations...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <script src="auth.js"></script>
    <script>
        let allViolations = [];

        window.addEventListener('auth-ready', async () => {
            await loadViolations();

            // Search & filter listeners
            document.getElementById('searchInput').addEventListener('input', filterViolations);
            document.getElementById('typeFilter').addEventListener('change', filterViolations);
        });

        async function loadViolations() {
            const sb = getSupabaseClient();

            // Teachers can see all violations (RLS policy allows SELECT for teachers)
            const { data, error } = await sb
                .from('violations')
                .select('*, students:student_id(name, lrn, sex, grade, section)')
                .order('created_at', { ascending: false });

            const content = document.getElementById('violationsContent');

            if (error) {
                content.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">⚠️</span>
                        <h4>Error loading records</h4>
                        <p>${error.message}</p>
                    </div>
                `;
                return;
            }

            allViolations = data || [];
            updateStats(allViolations);
            renderViolations(allViolations);
        }

        function updateStats(violations) {
            const total = violations.length;
            const hair = violations.filter(v => v.violation_type.toLowerCase().includes('hair')).length;
            const uniform = violations.filter(v => v.violation_type.toLowerCase().includes('uniform')).length;
            const students = new Set(violations.map(v => v.student_id)).size;

            document.getElementById('totalViolations').textContent = total;
            document.getElementById('totalStudents').textContent = students;
            document.getElementById('hairViolations').textContent = hair;
            document.getElementById('uniformViolations').textContent = uniform;
        }

        function filterViolations() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const typeFilter = document.getElementById('typeFilter').value;

            let filtered = allViolations;

            if (search) {
                filtered = filtered.filter(v => {
                    const name = (v.students?.name || '').toLowerCase();
                    const lrn = (v.students?.lrn || '').toLowerCase();
                    return name.includes(search) || lrn.includes(search);
                });
            }

            if (typeFilter) {
                if (typeFilter === 'other') {
                    filtered = filtered.filter(v => {
                        const t = v.violation_type.toLowerCase();
                        return !t.includes('hair') && !t.includes('uniform');
                    });
                } else {
                    filtered = filtered.filter(v =>
                        v.violation_type.toLowerCase().includes(typeFilter)
                    );
                }
            }

            renderViolations(filtered);
        }

        function renderViolations(violations) {
            const content = document.getElementById('violationsContent');
            const countEl = document.getElementById('resultCount');
            countEl.textContent = `${violations.length} record${violations.length !== 1 ? 's' : ''}`;

            if (violations.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">📭</span>
                        <h4>No Violations Found</h4>
                        <p>No records match your search criteria.</p>
                    </div>
                `;
                return;
            }

            content.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student</th>
                            <th>LRN</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Gender</th>
                            <th>Reported By</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${violations.map((v, i) => {
                const type = v.violation_type.toLowerCase();
                const badgeClass = type.includes('hair') ? 'badge-hair' :
                    type.includes('uniform') ? 'badge-uniform' : 'badge-other';
                const date = new Date(v.created_at).toLocaleDateString('en-PH', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                const name = v.students?.name || 'Unknown';
                const lrn = v.students?.lrn || '-';
                const sex = v.students?.sex || '-';
                return `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td><strong>${name}</strong></td>
                                    <td style="font-family:monospace;font-size:0.8rem;">${lrn}</td>
                                    <td><span class="violation-badge ${badgeClass}">${v.violation_type}</span></td>
                                    <td>${v.description || '-'}</td>
                                    <td>${sex}</td>
                                    <td>${v.reported_by || 'System'}</td>
                                    <td>${date}</td>
                                </tr>
                            `;
            }).join('')}
                    </tbody>
                </table>
            `;
        }
    </script>
</body>

</html>
